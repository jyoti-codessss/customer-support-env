from huggingface_hub import HfApi
from google.colab import userdata

HF_TOKEN = userdata.get('HF_TOKEN')
api = HfApi(token=HF_TOKEN)

# Updated yaml content
yaml_content = """name: customer-support-agent
version: "2.0.0"
description: >
  A multi-turn, multi-agent customer support simulation environment where a 
  3-layer AI agent system resolves user complaints through typed actions.
  Features world modeling, 10-slot memory, and GRPO-trained policy.
tags:
  - openenv
  - customer-support
  - multi-turn
  - multi-agent
  - grpo
  - world-modeling
  - long-horizon
  - reasoning
  - escalation
author: OpenEnv Hackathon Submission — Jyoti Yadav
license: MIT
"""

# Save and push
with open('/content/openenv.yaml', 'w') as f:
    f.write(yaml_content)

api.upload_file(
    path_or_fileobj='/content/openenv.yaml',
    path_in_repo='openenv.yaml',
    repo_id='Jyoti-6/customer-support-env',
    repo_type='space',
    token=HF_TOKEN
)
print('✅ Pushed!')