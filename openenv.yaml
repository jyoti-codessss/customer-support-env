name: customer-support-agent
version: "2.0.0"          # upgrade karo
description: >
  A multi-turn, multi-agent customer support simulation environment where a 
  3-layer AI agent system resolves user complaints through typed actions — 
  responding, escalating, issuing refunds, and closing tickets. Features 
  world modeling, 10-slot memory, and GRPO-trained policy for self-improvement.
tags:
  - openenv
  - customer-support
  - multi-turn
  - multi-agent        # add karo
  - reasoning
  - escalation
  - grpo               # add karo
  - world-modeling     # add karo
  - long-horizon       # add karo
author: OpenEnv Hackathon Submission — Jyoti Yadav
license: MIT

# ... baaki same ...

tasks:
  - id: billing_dispute_easy
    difficulty: easy
    description: Resolve a simple billing overcharge complaint
  - id: technical_outage_medium
    difficulty: medium
    description: Triage a multi-symptom technical support case requiring escalation
  - id: fraud_complaint_hard
    difficulty: hard
    description: Handle a complex fraud + account compromise with multi-step verification
  - id: returns_exchange_medium    # add karo agar Space mein hai
    difficulty: medium
    description: Process product return and exchange requests
  - id: account_security_expert    # add karo agar Space mein hai
    difficulty: expert
    description: Handle account security breach with multi-step verification